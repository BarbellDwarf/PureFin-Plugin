name: Lint Workflows

on:
  push:
    branches: [main, develop]
    paths:
      - '.github/workflows/**'
  pull_request:
    branches: [main, develop]
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: lint-workflows-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Lint GitHub Actions workflows
        uses: reviewdog/action-actionlint@v1