# NVIDIA GPU overlay for PureFin AI services
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build -d
#
# Requirements:
#   - NVIDIA GPU with driver ≥ 525
#   - NVIDIA Container Toolkit installed and configured
#   - Smoke test: docker run --rm --gpus all nvidia/cuda:12.4.1-base-ubuntu22.04 nvidia-smi
#
# GPU path:  CUDA 12.4 for PyTorch inference; NVDEC (cuda hwaccel) for FFmpeg frame decode.
# nsfw-detector: TensorFlow does not have a supported NVIDIA wheel for Python 3.11
#   on recent CUDA — it runs CPU-only until a Python 3.12 base image is adopted.

x-nvidia-env: &nvidia-env
  USE_GPU: "1"
  CUDA_VISIBLE_DEVICES: "${CUDA_VISIBLE_DEVICES:-0}"
  # Tell FFmpeg to use NVDEC hardware decode (cuda hwaccel)
  FFMPEG_HWACCEL: "cuda"

x-nvidia-runtime: &nvidia-runtime
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

services:
  scene-analyzer:
    build:
      context: ./services/scene-analyzer
      dockerfile: Dockerfile.nvidia
    environment:
      <<: *nvidia-env
    <<: *nvidia-runtime

  violence-detector:
    build:
      context: ./services/violence-detector
      dockerfile: Dockerfile.nvidia
    environment:
      <<: *nvidia-env
    <<: *nvidia-runtime

  # nsfw-detector: TF GPU wheels for Python 3.11 are not available on CUDA 12.4.
  # Runs CPU-only in NVIDIA mode until base image is updated to Python 3.12.
  nsfw-detector:
    environment:
      USE_GPU: "0"

  content-classifier:
    profiles: ["legacy"]
    build:
      context: ./services/content-classifier
      args:
        BUILD_WITH_CUDA: "1"
    environment:
      <<: *nvidia-env
    <<: *nvidia-runtime
