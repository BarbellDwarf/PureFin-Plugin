# PureFin Content Filter - AI Services
#
# Usage:
#   docker compose up -d
#
# Set your media path via environment variable or .env file:
#   JELLYFIN_MEDIA_PATH=/your/media/path
#   SEGMENTS_PATH=/your/segments/path

services:
  nsfw-detector:
    build: ./services/nsfw-detector
    container_name: nsfw-detector
    ports:
      - "3001:3000"
    volumes:
      - ${MODELS_PATH:-./models}:/app/models:ro
      - ${TEMP_PATH:-./temp}:/tmp/processing
      - ${JELLYFIN_MEDIA_PATH:-/path/to/your/media}:/mnt/media:ro
    environment:
      - MODEL_PATH=/app/models
      - PROCESSING_DIR=/tmp/processing
      - MODEL_IDLE_UNLOAD_SECONDS=${MODEL_IDLE_UNLOAD_SECONDS:-900}
      - MODEL_IDLE_CHECK_SECONDS=${MODEL_IDLE_CHECK_SECONDS:-30}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  scene-analyzer:
    build: ./services/scene-analyzer
    container_name: scene-analyzer
    ports:
      - "3002:3000"
    volumes:
      - ${TEMP_PATH:-./temp}:/tmp/processing
      - ${JELLYFIN_MEDIA_PATH:-/path/to/your/media}:/mnt/media:ro
      - ${SEGMENTS_PATH:-./segments}:/segments:rw
    environment:
      - PROCESSING_DIR=/tmp/processing
      - NSFW_DETECTOR_URL=http://nsfw-detector:3000
      - VIOLENCE_DETECTOR_URL=http://violence-detector:3000
      - PROFANITY_DETECTOR_URL=${PROFANITY_DETECTOR_URL:-}
      - VIOLENCE_MODEL_VERSION=${VIOLENCE_MODEL_VERSION:-jaranohaal/vit-base-violence-detection}
      - MODEL_IDLE_UNLOAD_SECONDS=${MODEL_IDLE_UNLOAD_SECONDS:-900}
      - MODEL_IDLE_CHECK_SECONDS=${MODEL_IDLE_CHECK_SECONDS:-30}
      - ANALYSIS_QUEUE_MAX_SIZE=${ANALYSIS_QUEUE_MAX_SIZE:-8}
      - ANALYSIS_QUEUE_WAIT_TIMEOUT_SECONDS=${ANALYSIS_QUEUE_WAIT_TIMEOUT_SECONDS:-10800}
    depends_on:
      - nsfw-detector
      - violence-detector
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  violence-detector:
    build: ./services/violence-detector
    container_name: violence-detector
    ports:
      - "3003:3000"
    volumes:
      - ${MODELS_PATH:-./models}:/app/models:rw
      - ${TEMP_PATH:-./temp}:/tmp/processing
      - ${JELLYFIN_MEDIA_PATH:-/path/to/your/media}:/mnt/media:ro
    environment:
      - MODEL_PATH=/app/models
      - VIOLENCE_MODEL_PROFILE=${VIOLENCE_MODEL_PROFILE:-balanced}
      - VIOLENCE_MODEL_ID=${VIOLENCE_MODEL_ID:-}
      - VIOLENCE_MODEL_REVISION=${VIOLENCE_MODEL_REVISION:-}
      - VIOLENCE_MODEL_SUBDIR=${VIOLENCE_MODEL_SUBDIR:-}
      - MODEL_IDLE_UNLOAD_SECONDS=${MODEL_IDLE_UNLOAD_SECONDS:-900}
      - MODEL_IDLE_CHECK_SECONDS=${MODEL_IDLE_CHECK_SECONDS:-30}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  content-classifier:
    profiles: ["legacy"]
    build: ./services/content-classifier
    container_name: content-classifier
    ports:
      - "3004:3000"
    volumes:
      - ${MODELS_PATH:-./models}:/app/models:rw
      - ${TEMP_PATH:-./temp}:/tmp/processing
      - ${JELLYFIN_MEDIA_PATH:-/path/to/your/media}:/mnt/media:ro
    environment:
      - MODEL_PATH=/app/models
      - PROCESSING_DIR=/tmp/processing
      - MODEL_IDLE_UNLOAD_SECONDS=${MODEL_IDLE_UNLOAD_SECONDS:-900}
      - MODEL_IDLE_CHECK_SECONDS=${MODEL_IDLE_CHECK_SECONDS:-30}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  profanity-detector:
    profiles: ["full"]
    build: ./services/profanity-detector
    container_name: profanity-detector
    ports:
      - "3005:3000"
    volumes:
      - ${MODELS_PATH:-./models}:/app/models:rw
      - ${TEMP_PATH:-./temp}:/tmp/processing
      - ${JELLYFIN_MEDIA_PATH:-/path/to/your/media}:/mnt/media:ro
    environment:
      - PROCESSING_DIR=/tmp/processing
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-base}
      - USE_GPU=0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

networks:
  default:
    name: content-filter-network
